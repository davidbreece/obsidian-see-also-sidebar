name: Release Obsidian plugin

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (defaults to manifest version)"
        required: false
        type: string
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine and verify release tag
        id: vars
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            if [ -z "$tag" ]; then
              tag="$manifest_version"
            fi
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag version ($tag) does not match manifest.json version ($manifest_version)."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: npm run build

      - name: Attest build provenance for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest build provenance for styles.css
        if: hashFiles('styles.css') != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.vars.outputs.tag }}"

          assets=(main.js manifest.json)
          if [ -f styles.css ]; then
            assets+=("styles.css")
          fi

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --generate-notes \
            "${assets[@]}"
